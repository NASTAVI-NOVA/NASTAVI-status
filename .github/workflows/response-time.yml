name: Response Time CI
on:
  schedule:
    - cron: "0 * * * *"          # Every hour, alongside the uptime check
  workflow_dispatch:

jobs:
  response-time:
    name: Log response times
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log response times
        uses: upptime/uptime-monitor@master
        with:
          UPPTIME_GH_APP_PRIVATE_KEY: ${{ secrets.UPPTIME_GH_APP_PRIVATE_KEY }}
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
