name: Generate Graphs
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  graphs:
    name: Generate graphs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate graphs
        uses: upptime/uptime-monitor@master
        with:
          command: graphs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
